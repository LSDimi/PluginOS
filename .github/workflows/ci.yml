name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build shared package
        run: npm run build:shared

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build all packages
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage

  claude-plugin-checks:
    name: Claude plugin sync and budgets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build:shared
      - name: Version lockstep
        run: node scripts/check-version-lockstep.cjs
      - name: Regenerate ops reference
        run: npm run sync-ops -w packages/claude-plugin
      - name: Verify no ops reference drift
        run: git diff --exit-code packages/claude-plugin/skills/pluginos-figma/references/operations.md
      - name: Skill token budget
        run: node scripts/check-skill-budget.cjs
      - name: Skill hygiene
        run: node scripts/check-skill-hygiene.cjs
      - name: Tier 1 rules budget
        run: node scripts/check-rules-budget.cjs
      - name: Claude plugin tests
        run: npm test -w packages/claude-plugin

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
        continue-on-error: true # Remove once Dependency Graph is enabled in repo settings
