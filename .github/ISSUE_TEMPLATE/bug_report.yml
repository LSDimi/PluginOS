name: Bug Report
description: Report a bug in PluginOS
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Start the MCP server with `npx pluginos`
        2. Connect from Figma plugin
        3. Run operation '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`.
      placeholder: v20.11.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: macOS 14.3 / Windows 11 / Ubuntu 22.04
    validations:
      required: true

  - type: input
    id: pluginos-version
    attributes:
      label: PluginOS Version
      description: Output of `npx pluginos --version` or the version in your package.json.
      placeholder: 1.0.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant log output or attach screenshots.
      render: text
    validations:
      required: false
